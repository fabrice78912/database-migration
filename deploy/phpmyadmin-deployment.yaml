apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpmyadmin-deployment
  namespace: dev
  labels:
    app: phpmyadmin
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: phpmyadmin
  template:
    metadata:
      labels:
        app: phpmyadmin
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - phpmyadmin
              topologyKey: "kubernetes.io/hostname"
      containers:
        - name: phpmyadmin
          image: phpmyadmin/phpmyadmin:latest
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1.5Gi"
          env:
            - name: PMA_HOST
              valueFrom:
                configMapKeyRef:
                  name: phpmyadmin-config
                  key: PMA_HOST
            - name: PMA_PORT
              valueFrom:
                configMapKeyRef:
                  name: phpmyadmin-config
                  key: PMA_PORT
            - name: TRUST_PROXY_HEADERS     # 🔁 AJOUTÉ pour HTTPS via Ingress
              value: "1"
            - name: PMA_ABSOLUTE_URI
              value: https://phpmyadmin.dev.local/
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: phpmyadmin-service
  namespace: dev
spec:
  type: NodePort
  selector:
    app: phpmyadmin
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30092
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: phpmyadmin-hpa           # Nom du HPA
  namespace: dev               # Namespace où le HPA est créé (ici "dev")
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: phpmyadmin-deployment  # Le déploiement cible que le HPA va surveiller et scaler
  minReplicas: 2               # Nombre minimum de pods que Kubernetes doit garder actifs
  maxReplicas: 4               # Nombre maximum de pods que Kubernetes peut créer automatiquement
  metrics:                     # Critères utilisés pour décider de scaler
    - type: Resource           # Le premier critère est une ressource
      resource:
        name: cpu              # Cette ressource est le CPU (processeur)
        target:
          type: Utilization    # Le HPA surveille l’utilisation (en pourcentage)
          averageUtilization: 80 # Si l’utilisation moyenne de CPU dépasse 80%, Kubernetes crée plus de pods
    - type: Resource           # Deuxième critère également une ressource
      resource:
        name: memory           # Cette ressource est la mémoire (RAM)
        target:
          type: Utilization    # Surveille aussi l’utilisation mémoire
          averageUtilization: 80 # Si la mémoire utilisée dépasse 80%, Kubernetes augmente aussi les pods
